{% extends "base.html" %}

{% block title %}Page Not Found | INSIGHT HIRE{% endblock %}

{% block content %}
<section class="not-found-section">
    <div class="container">
        <div class="panel empty-state">
            <p class="eyebrow">404</p>
            <h1>That page is not available.</h1>
            <p>Return to the dashboard or search page to continue exploring INSIGHT HIRE.</p>
            <div class="hero-actions">
                <a href="{{ url_for('landing') }}" class="btn btn-primary">Back Home</a>
                <a href="{{ url_for('search') if current_user else url_for('login') }}" class="btn btn-secondary">Go to Search</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
